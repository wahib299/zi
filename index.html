<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Tables - Mariage de Wahib & Diana</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&family=Noto+Naskh+Arabic:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #a2d9d9;
            --secondary-color: #8ba898;
            --gold-color: #d4af7a;
            --text-color: #5e5245;
            --light-bg: #fefbf3;
            --hover-color: #e8f0ed;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --border-radius: 8px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 30px;
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .arabic-script {
            font-family: 'Noto Naskh Arabic', serif;
            font-size: 1.8em;
            color: var(--gold-color);
            text-align: center;
            margin-bottom: 10px;
            direction: rtl;
        }

        .quran-verse-translation {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 1em;
            font-style: italic;
            color: var(--gold-color);
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            color: var(--gold-color);
            margin-bottom: 20px;
            font-family: 'Great Vibes', cursive;
            font-size: 2.5em;
        }

        .table-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .table-item {
            background-color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .table-title {
            padding: 18px 25px;
            background-color: rgba(162, 217, 217, 0.3);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .table-title:hover {
            background-color: rgba(139, 168, 152, 0.3);
        }

        .table-title i {
            transition: transform 0.3s ease;
            color: var(--gold-color);
        }

        .table-title.rotate i {
            transform: rotate(180deg);
        }

        .guest-count {
            background-color: rgba(212, 175, 122, 0.2);
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-left: 10px;
            color: var(--gold-color);
            font-weight: 600;
        }

        .guests-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: rgba(248, 250, 248, 0.7);
        }

        .guests-container.open {
            max-height: 1000px;
            transition: max-height 0.4s ease-in;
            padding: 15px 25px;
        }

        .guests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .guest {
            background-color: var(--hover-color);
            padding: 10px 15px;
            border-radius: var(--border-radius);
            text-align: center;
            transition: var(--transition);
            border: 1px solid rgba(139, 168, 152, 0.2);
            position: relative;
        }

        .guest::before {
            content: '❤';
            position: absolute;
            top: -8px;
            right: -8px;
            font-size: 10px;
            color: rgba(212, 175, 122, 0.4);
        }

        .guest:hover {
            background-color: rgba(162, 217, 217, 0.4);
            color: var(--text-color);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-style: italic;
            color: var(--secondary-color);
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .guests-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="arabic-script">
            بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
        </div>

        <div class="quran-verse-translation">
            « Et Nous vous avons créés par paires. »
        </div>

        <h1>Wahib & Diana</h1>

        <div class="table-list" id="table-list">
            <!-- Les tables seront générées ici -->
        </div>

        <div class="footer">
            Samedi 18 avril 2026
        </div>
    </div>

    <script>
        // Données des tables et invités
        const tablesData = [{
            id: "Table 2",
            guests: ["Adel", "Antar", "Lamine", "Ali", "Hanine", "Ferhat", "Bilel", "Sofiane"]
        }];

        // Génère la liste des tables
        function renderTables() {
            const tableList = document.getElementById('table-list');
            tableList.innerHTML = tablesData.map((table, index) => `
                <div class="table-item">
                    <div class="table-title" onclick="toggleTable(${index})">
                        <span>${table.id}</span>
                        <div>
                            <span class="guest-count">${table.guests.length} invité(s)</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="guests-container" id="guests-${index}">
                        <div class="guests-grid">
                            ${table.guests.map(guest => `<div class="guest">${guest}</div>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Bascule l'affichage d'une table
        function toggleTable(index) {
            const container = document.getElementById(`guests-${index}`);
            const title = container.previousElementSibling;

            container.classList.toggle('open');
            title.classList.toggle('rotate');
        }

        // Initialise la page
        renderTables();
    </script>
</body>
</html>
